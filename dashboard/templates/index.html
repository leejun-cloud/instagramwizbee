<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizbee Content Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🐝</span> Wizbee
            </div>
            <nav class="menu">
                <a href="#" class="menu-item">Dashboard</a>
                <a href="#" class="menu-item active">Content</a>
                <a href="#" class="menu-item">Scheduler</a>
                <a href="#" class="menu-item">Analytics</a>
            </nav>
            <div class="settings-area">
                <div class="auto-publish-toggle">
                    <label class="switch">
                        <input type="checkbox" id="autoPublishToggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label">Auto-Publish All</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <h1>Content Dashboard</h1>
                    <p class="subtitle">Instagram Card News Previews</p>
                </div>
            </header>

            <div class="content-grid" id="postGrid">
                <!-- Cards will be dynamically injected here -->
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2>Edit Post <span id="modalDayNumber"></span></h2>
            <div class="form-group">
                <label>Hook</label>
                <textarea id="editHook" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Caption</label>
                <textarea id="editCaption" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>Hashtags</label>
                <textarea id="editHashtags" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePostEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
