<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizbee Content Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="top-nav">
            <div class="logo">🐝 Wizbee <span>Manager</span></div>
            <div class="nav-controls">
                <div class="auto-publish-toggle">
                    <span class="toggle-label">Auto-Publish Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="autoPublishToggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="batch-controls">
                    <button class="btn btn-batch" onclick="generateBatch()">🚀 Generate 30 Days</button>
                    <button class="btn btn-sync" onclick="syncToCloud()">☁️ Sync to Cloud</button>
                </div>
                <button class="btn btn-refresh" onclick="loadPosts()">↻ Refresh</button>
            </div>
        </header>

        <main class="content-view">
            <div class="view-header">
                <h2>Content List</h2>
                <div class="filter-tabs">
                    <button class="tab-btn active" onclick="filterBy('all')">All</button>
                    <button class="tab-btn" onclick="filterBy('pending')">Pending</button>
                    <button class="tab-btn" onclick="filterBy('published')">Published</button>
                </div>
            </div>

            <div class="content-grid" id="postGrid">
                <!-- Posts will be injected here -->
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2>Edit Post <span id="modalDayNumber"></span></h2>
            <div class="form-group">
                <label>Hook (Short Quote)</label>
                <textarea id="editHook" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Full Caption</label>
                <textarea id="editCaption" rows="6"></textarea>
            </div>
            <div class="form-group">
                <label>Hashtags</label>
                <textarea id="editHashtags" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePostEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
