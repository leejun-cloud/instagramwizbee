name: Daily Instagram Post

on:
  schedule:
    # 매일 오전 0시 (UTC) -> 한국 시간(KST) 오전 9시
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동으로 즉시 실행 가능하게 설정

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Autopilot Script
      env:
        INSTA_ACCOUNT_ID: ${{ secrets.INSTA_ACCOUNT_ID }}
        INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        PYTHONIOENCODING: utf-8
      run: python insta_autopilot.py
