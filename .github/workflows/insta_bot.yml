name: Instagram Automation Bot

on:
  schedule:
    - cron: '*/30 * * * *' # 매 30분마다 루틴 실행 (댓글 관리 등)
    - cron: '0 9 * * 1'    # 매주 월요일 오전 9시 (KST 기준 새벽 1시/2시) 슬랙 알림
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Comment Monitor & Reply
        env:
          INSTA_ACCOUNT_ID: ${{ secrets.INSTA_ACCOUNT_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        run: python insta_commenter.py

      - name: Run Daily Post (Auto)
        env:
          INSTA_ACCOUNT_ID: ${{ secrets.INSTA_ACCOUNT_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        run: |
          echo "🚀 Checking for approved posts to publish..."
          python insta_autopilot.py --auto

  slack-approval:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Send Slack Approval Notice
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python insta_approver.py
