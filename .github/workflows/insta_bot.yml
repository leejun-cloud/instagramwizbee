name: Instagram Automation Bot

on:
  schedule:
    - cron: '*/30 * * * *' # 매 30분마다 실행
  workflow_dispatch: # 수동 실행 가능

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Comment Monitor & Reply
        env:
          INSTA_ACCOUNT_ID: ${{ secrets.INSTA_ACCOUNT_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        run: python insta_commenter.py

      - name: Run Daily Post (Only if scheduled time matches - optional logic)
        env:
          INSTA_ACCOUNT_ID: ${{ secrets.INSTA_ACCOUNT_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        run: |
          # 현재는 테스트를 위해 수동으로 또는 특정 로직에 따라 실행하도록 구성 가능
          # 예: python insta_autopilot.py 1
          echo "Daily post check skipped in this step (manual/logic check required)"
