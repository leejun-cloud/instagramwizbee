<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizbee Content Manager (Cloud - RTDB)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="top-nav">
            <div class="logo">🐝 Wizbee <span>Cloud Manager</span></div>
            <div class="nav-controls">
                <div class="auto-publish-toggle">
                    <span class="toggle-label">Realtime DB Active</span>
                    <div class="status-indicator online" title="RTDB Connected"></div>
                </div>
                <div class="batch-controls">
                    <button class="btn btn-batch" onclick="generateBatch()">🚀 Generate 30 Days</button>
                    <button class="btn btn-seed" id="seedBtn" style="display:none;" onclick="seedLocalData()">📥 Seed Local Data</button>
                </div>
                <button class="btn btn-refresh" onclick="loadPosts()">↻ Refresh</button>
            </div>
        </header>

        <main class="content-view">
            <div class="view-header">
                <h2>Cloud Content List</h2>
                <div class="filter-tabs">
                    <button class="tab-btn active" data-filter="all">All</button>
                    <button class="tab-btn" data-filter="pending">Pending</button>
                    <button class="tab-btn" data-filter="published">Published</button>
                </div>
            </div>

            <div class="content-grid" id="postGrid">
                <div class="loading-state">Connecting to Realtime Cloud...</div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2>Edit Post <span id="modalDayNumber"></span></h2>
            <div class="form-group">
                <label>Hook (Short Quote)</label>
                <textarea id="editHook" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Full Caption</label>
                <textarea id="editCaption" rows="6"></textarea>
            </div>
            <div class="form-group">
                <label>Hashtags</label>
                <textarea id="editHashtags" rows="2"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="savePostEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Modular v11) - Realtime Database + Anonymous Auth -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, get, child } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        // firebase-config.js is gitignored. Copy firebase-config.example.js to firebase-config.js
        // and fill in your Firebase Web API key. The file is not committed to the repository.
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const auth = getAuth(app);

        // Make functions globally available
        window.rtdb = rtdb;
        window.dbRef = ref;
        window.onValue = onValue;
        window.dbSet = set;
        window.dbUpdate = update;
        window.dbGet = get;
        window.dbChild = child;
        window.authReady = false;

        // Sign in anonymously so the dashboard can write under `auth != null` rules.
        // Requires: Firebase Console → Authentication → Sign-in method → Anonymous: Enabled.
        signInAnonymously(auth).catch((err) => {
            console.error("Anonymous sign-in failed:", err);
            alert(
                "Firebase Anonymous Auth failed. Please enable it in the Firebase Console
" +
                "(Authentication → Sign-in method → Anonymous). Reads will still work; writes will be blocked."
            );
        });

        onAuthStateChanged(auth, (user) => {
            window.authReady = !!user;
            if (user) console.log("🔐 Firebase auth ready (uid: " + user.uid.slice(0, 6) + "…)");
        });

        console.log("Firebase RTDB Initialized.");
    </script>
    <script src="app.js"></script>
</body>
</html>
